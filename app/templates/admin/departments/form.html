{% extends "admin/layout.html" %}
{% block title %}{{ '编辑' if org else '新建' }}部门{% endblock %}
{% block admin_content %}
<h2 class="mb-4">{{ '编辑' if org else '新建' }}院系部门</h2>
<div class="card border-0 shadow-sm">
  <div class="card-body">
    <form method="post">
      <div class="mb-3">
        <label class="form-label">部门名称 *</label>
        <input type="text" name="name" class="form-control" required value="{{ org.name if org else '' }}" placeholder="如：教务处、计算机学院">
      </div>
      <div class="mb-3">
        <label class="form-label">上级部门</label>
        <select name="parent_id" class="form-select">
          <option value="">无（顶级单位，如学校本部）</option>
          {% for p in parents %}
          <option value="{{ p.id }}" {% if org and org.parent_id == p.id %}selected{% endif %}>{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{{ url_for('admin.departments') }}" class="btn btn-outline-secondary">返回</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
